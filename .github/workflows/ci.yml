name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: 1.3.14
      - name: Install locked workspace dependencies
        run: bun install --frozen-lockfile
      - name: Verify canonical workspace and generated parity
        run: bun run verify
      - name: Verify workflows and credential hygiene
        run: bun run security:check
      - name: Rebuild generated plugin reproducibly
        run: |
          bun run plugin:build
          bun run plugin:check
          git diff --exit-code -- plugins/skizzles
      - name: Reject retained build and local-state artifacts
        shell: bash
        run: |
          matches="$(find packages skills plugins -path '*/node_modules' -prune -o \( -name .DS_Store -o -name '*.tsbuildinfo' -o -name bun.lock -o -name '*.log' -o -name '*.db' \) -print)"
          test -z "$matches" || { printf '%s\n' "$matches"; exit 1; }
